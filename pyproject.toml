[tool.uv]
package = false

[tool.uv.workspace]
members = [
    "apps/*",
    "packages/*",
    "services/*",
]

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
    "pytest-cov>=7.1.0",
    "pytest-xdist>=3.8.0",
    "mypy>=2.0.0",
    "ruff>=0.15.12",
    "deptry>=0.25.1",
    "python-dotenv>=1.2.1",
    "bump-my-version>=1.3.0",
    "pre-commit>=4.6.0",
    "codespell>=2.4.2",
    "hypothesis>=6.0.0",
    "types-requests>=2.33.0.20260518",
]

[tool.pytest.ini_options]
# Discover tests across the whole monorepo
testpaths = [
    "apps",
    "services",
    "packages",
]

# Naming conventions
python_files     = "test_*.py"
python_classes   = "Test*"
python_functions = "test_*"
asyncio_mode     = "auto"

# Coverage
addopts = """
    --import-mode=importlib
    -n auto
    --cov=pizza_app
    --cov=pizza_api
    --cov=pizza_worker
    --cov=pizza_data_collector
    --cov=pizza_data_storage
    --cov=geolocation
    --cov=pizza_platform_shared
    --cov-report=term-missing
"""

[tool.codespell]
skip = "**/alembic/**"

[tool.coverage.run]
branch   = true
parallel = true

[tool.coverage.report]
fail_under    = 35
show_missing  = true
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "def __str__",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
    "@(abc\\.)?abstractmethod",
]

[tool.ruff]
line-length    = 100
indent-width   = 4
target-version = "py314"
exclude        = ["**/alembic/**"]

[tool.ruff.lint]
select  = ["ALL"]
exclude = ["D"]
ignore  = [
    "D",      # pydocstyle rules
    "FIX002", # Line contains to-do, consider resolving the issue
    "CPY001", # Missing copyright notice at top of file
    "TC001",  # Type checking imports
    "TC002",  # Type checking imports
    "TC003",  # Type checking imports
    "COM812", # Conflicts with ruff formatter
]


[tool.ruff.lint.per-file-ignores]
"**/tests/**/*.py" = ["S101", "S106", "PLR2004", "INP001"]

[tool.ruff.lint.isort]
known-first-party = [
    "pizza_platform_shared",
    "pizza_app",
    "pizza_api",
    "pizza_worker",
    "pizza_data_collector",
    "pizza_data_storage",
    "geolocation",
]

[tool.ruff.lint.pycodestyle]
max-doc-length = 100

[tool.ruff.format]
quote-style               = "double"
indent-style              = "space"
skip-magic-trailing-comma = false
docstring-code-format     = true

[tool.mypy]
python_version = "3.14"
strict         = true

plugins = [
    "sqlalchemy.ext.mypy.plugin",
    "pydantic.mypy",
    "pandera.mypy",
]

# Monorepo: src-layout requires explicit src/ paths so mypy doesn't pick up the
# project-root directories as namespace packages and shadow the real source.
mypy_path = [
    "apps/pizza_app/src",
    "apps/pizza_api/src",
    "apps/pizza_worker/src",
    "packages/pizza_platform_shared/src",
    "services/geolocation/src",
    "services/pizza_data_collector/src",
    "services/pizza_data_storage/src",
]

[[tool.mypy.overrides]]
module = "streamlit_folium"
ignore_missing_imports = true


[tool.alembic]
script_location  = "services/pizza_data_storage/alembic"
prepend_sys_path = "."
path_separator   = "os"

[tool.alembic.loggers]
keys = "root,sqlalchemy,alembic"

[tool.alembic.handlers]
keys = "console"

[tool.alembic.formatters]
keys = "generic"

[tool.alembic.logger_root]
level    = "WARNING"
handlers = "console"
qualname = ""

[tool.alembic.logger_sqlalchemy]
level    = "WARNING"
handlers = ""
qualname = "sqlalchemy.engine"

[tool.alembic.logger_alembic]
level    = "INFO"
handlers = ""
qualname = "alembic"

[tool.alembic.handler_console]
class     = "StreamHandler"
args      = "(sys.stderr,)"
level     = "NOTSET"
formatter = "generic"

[tool.alembic.formatter_generic]
format  = "%(levelname)-5.5s [%(name)s] %(message)s"
datefmt = "%H:%M:%S"
