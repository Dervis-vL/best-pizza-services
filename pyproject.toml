[tool.uv]
package = false

[tool.uv.workspace]
members = [
    "apps/*",
    "packages/*",
    "services/*",
]

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
    "pytest-cov>=7.1.0",
    "pytest-xdist>=3.8.0",
    "mypy>=2.0.0",
    "ruff>=0.15.12",
    "deptry>=0.25.1",
    "python-dotenv>=1.2.1",
    "bump-my-version>=1.3.0",
]

[tool.pytest.ini_options]
# Discover tests across the whole monorepo
testpaths = [
    "apps",
    "services",
    "packages",
]

# Naming conventions
python_files = "test_*.py"
python_classes = "Test*"
python_functions = "test_*"
asyncio_mode = "auto"

# Coverage
addopts = """
    --import-mode=importlib
    -n auto
    --cov=pizza_app
    --cov=pizza_api
    --cov=pizza_data_collector
    --cov=pizza_data_storage
    --cov=geolocation
    --cov=pizza_platform_shared
    --cov-report=term-missing
    --cov-fail-under=100
"""

[tool.coverage.run]
branch   = true
parallel = true

[tool.coverage.report]
fail_under   = 100
show_missing = true
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "def __str__",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
    "@(abc\\.)?abstractmethod",
]

[tool.ruff]
line-length = 88
target-version = "py314"

[tool.ruff.lint]
select = [
    "E", "W",   # pycodestyle
    "F",        # pyflakes
    "I",        # isort
    "N",        # pep8-naming
    "UP",       # pyupgrade
    "B",        # bugbear
    "C4",       # comprehensions
    "SIM",      # simplify
    "PL",       # pylint rules  ← replaces pylint
    "PT",       # pytest style
    "S",        # security      ← replaces bandit
    "DTZ",      # no naive datetimes
    "ASYNC",    # async anti-patterns
    "RUF",      # ruff-specific
]

[tool.ruff.lint.per-file-ignores]
"**/tests/**/*.py" = ["S101", "S106", "PLR2004"]

[tool.ruff.lint.isort]
known-first-party = [
    "pizza_platform_shared",
    "pizza_app",
    "pizza_api",
    "pizza_data_collector",
    "pizza_data_storage",
    "geolocation",
]

[tool.ruff.lint.pycodestyle]
max-doc-length = 99

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
docstring-code-format = true

[tool.mypy]
python_version = "3.14"
strict         = true

plugins = [
    "sqlalchemy.ext.mypy.plugin",
    "pydantic.mypy",
]

# Monorepo: tells mypy where first-party packages live
mypy_path = ["apps", "packages", "services"]

[tool.deptry]
ignore_notebooks = true
per_rule_ignores = { DEP002 = ["pytest-asyncio", "pytest-cov", "pytest-xdist"] }

[tool.bumpversion]
current_version = "0.1.0"
commit          = true
tag             = true
tag_name        = "v{new_version}"
tag_message     = "Release {new_version}"
commit_args     = "--no-verify"   # skip pre-commit hooks on version bump commits

[[tool.bumpversion.files]]
filename = "pyproject.toml"
search   = 'current_version = "{current_version}"'
replace  = 'current_version = "{new_version}"'