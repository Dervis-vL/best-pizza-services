[tool.uv]
package = false

[tool.uv.workspace]
members = [
    "apps/*",
    "packages/*",
    "services/*",
]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-cov>=5.0",
    "mypy>=1.10",
    "ruff>=0.4",
    "deptry>=0.25.1",
    "python-dotenv>=1.2.1",
]

[tool.pytest.ini_options]
# Discover tests across the whole monorepo
testpaths = [
    "apps",
    "services",
    "packages",
]

# Naming conventions
python_files = "test_*.py"
python_classes = "Test*"
python_functions = "test_*"
asyncio_mode = "auto"

# Coverage
addopts = """
    --cov=pizza_app
    --cov=pizza_data_collector
    --cov=pizza_data_storage
    --cov=geolocation
    --cov=pizza_platform_shared
    --cov-report=term-missing
    --cov-report=html:reports/coverage
"""

[tool.ruff]
line-length = 88
