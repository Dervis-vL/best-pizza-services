[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "pizza_data_storage"
version = "0.1.0"
description = "The storage service for db maintenance"
authors = [{ name = "DerpVis Codes", email = "dervis.vanleersum@gmail.com" }]
readme = "README.md"
requires-python = ">=3.13"

dependencies = [
    "alembic>=1.18.4",
    "pandera>=0.29.0",
    "psycopg2-binary>=2.9.11",
    "pydantic>=2.12.5",
    "pydantic-settings>=2.12.0",
    "sqlalchemy>=2.0.46",
    "yarl>=1.22.0",
    "pizza-platform-shared",
    "boto3>=1.42.92",
]

[tool.hatch.build.targets.wheel]
packages = ["src/pizza_data_storage"]

[tool.uv.sources]
pizza-platform-shared = { workspace = true }

[tool.alembic]
script_location  = "services/pizza_data_storage/alembic"
prepend_sys_path = "."
path_separator   = "os"

[tool.alembic.loggers]
keys = "root,sqlalchemy,alembic"

[tool.alembic.handlers]
keys = "console"

[tool.alembic.formatters]
keys = "generic"

[tool.alembic.logger_root]
level    = "WARNING"
handlers = "console"
qualname = ""

[tool.alembic.logger_sqlalchemy]
level    = "WARNING"
handlers = ""
qualname = "sqlalchemy.engine"

[tool.alembic.logger_alembic]
level    = "INFO"
handlers = ""
qualname = "alembic"

[tool.alembic.handler_console]
class     = "StreamHandler"
args      = "(sys.stderr,)"
level     = "NOTSET"
formatter = "generic"

[tool.alembic.formatter_generic]
format  = "%(levelname)-5.5s [%(name)s] %(message)s"
datefmt = "%H:%M:%S"

