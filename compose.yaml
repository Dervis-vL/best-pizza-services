services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PIZZA_DB_USER:-pizza_api_user}
      POSTGRES_PASSWORD: ${PIZZA_DB_PASSWORD:?PIZZA_DB_PASSWORD is required}
      POSTGRES_DB: ${PIZZA_DB_NAME:-pizza_platform}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PIZZA_DB_USER:-pizza_api_user}"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"  # exposed so you can run alembic from your host

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${STORAGE_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"  # API port
      - "9001:9001"  # Console port
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  pizza_api:
    build:
      context: .
      dockerfile: apps/pizza_api/Dockerfile
    restart: unless-stopped
    env_file: .env.local
    environment:
      PIZZA_DB_HOST: db
      PIZZA_DB_USER: ${PIZZA_DB_USER:-pizza_api_user}
      PIZZA_DB_PASSWORD: ${PIZZA_DB_PASSWORD:?PIZZA_DB_PASSWORD is required}
      PIZZA_DB_NAME: ${PIZZA_DB_NAME:-pizza_platform}
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_KEY_ID: ${STORAGE_KEY_ID:-minioadmin}
      STORAGE_SECRET: ${STORAGE_SECRET:-minioadmin}
      STORAGE_BUCKET: pizza-html
      STORAGE_REGION: fr-par
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 3

  pizza_app:
    build:
      context: .
      dockerfile: apps/pizza_app/Dockerfile
    env_file: .env.local
    environment:
      PIZZA_API_URL: http://pizza_api:8000
    ports:
      - "8501:8501"
    depends_on:
      pizza_api:
        condition: service_healthy

volumes:
  pgdata:
    name: pizza_pgdata
  minio_data:
    name: pizza_minio_data
