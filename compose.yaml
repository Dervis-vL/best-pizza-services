services:
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${STORAGE_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"  # API port
      - "9001:9001"  # Console port
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  pizza_api:
    build:
      context: .
      dockerfile: apps/pizza_api/Dockerfile
    restart: unless-stopped
    env_file: .env.local
    environment:
      # Override host to use the compose service name instead of localhost
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_KEY_ID: ${STORAGE_KEY_ID:-minioadmin}
      STORAGE_SECRET: ${STORAGE_SECRET:-minioadmin}
      STORAGE_BUCKET: pizza-html
      STORAGE_REGION: fr-par
    depends_on:
      minio:
        condition: service_healthy
    ports:
      - "8000:8000"

  pizza_app:
    build:
      context: .
      dockerfile: apps/pizza_app/Dockerfile
    env_file: .env.local
    environment:
      SQLITE_DB_PATH: /data/pizza_app.db
    volumes:
      - ./data/pizza.db:/app/data/pizza.db:ro
    ports:
      - "8501:8501"
    depends_on:
      - pizza_api

volumes:
  pgdata:
    name: pizza_pgdata
  minio_data:
    name: pizza_minio_data
