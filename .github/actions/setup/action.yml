name: Setup
description: Install just + uv, restore cache, sync dependencies

runs:
  using: composite
  steps:
    - name: Install just
      uses: extractions/setup-just@v2

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Install dependencies
      run: uv sync
      shell: bash
