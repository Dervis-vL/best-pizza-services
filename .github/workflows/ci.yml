name: CI

on:
  push:
    # sync/** are throwaway back-merge branches (main -> development); they carry
    # no new work, so don't spend a CI run on them. All other branches still run.
    branches-ignore:
      - 'sync/**'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history + tags so version-check can diff each project
          fetch-depth: 0
      - uses: ./.github/actions/setup

      - name: Run checks
        run: just check

  build-dev:
    if: github.ref == 'refs/heads/development'
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      sha: ${{ steps.sha.outputs.sha }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup

      - id: sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push dev images
        run: just push-ghcr-dev ${{ steps.sha.outputs.sha }}

  scan:
    if: github.ref == 'refs/heads/development'
    needs: build-dev
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase owner
        id: owner
        run: echo "value=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Scan pizza-api
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ steps.owner.outputs.value }}/pizza-api:${{ needs.build-dev.outputs.sha }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Scan pizza-app
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ steps.owner.outputs.value }}/pizza-app:${{ needs.build-dev.outputs.sha }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL,HIGH

  deploy-staging:
    if: github.ref == 'refs/heads/development'
    needs: [scan, build-dev]
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Deploy to staging
        run: |
          echo "TODO: deploy ghcr.io/${{ github.repository_owner }}/pizza-api:${{ needs.build-dev.outputs.sha }}"

  smoke-tests:
    if: github.ref == 'refs/heads/development'
    needs: deploy-staging
    runs-on: ubuntu-latest
    steps:
      - name: Smoke test
        run: |
          echo "TODO: curl https://staging.your-domain.com/health"

  release:
    # Skip when the trigger is release's own version-bump commit. A PAT push.
    if: >
      github.ref == 'refs/heads/main' &&
      !contains(github.event.head_commit.message, 'reset release scopes')
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    outputs:
      api_version: ${{ steps.versions.outputs.api }}
      app_version: ${{ steps.versions.outputs.app }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # PAT (admin-owned) so the version-bump push can bypass the "PRs only" ruleset
          token: ${{ secrets.RELEASE_PAT }}
      - uses: ./.github/actions/setup

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump versions for changed projects
        run: just version

      - name: Capture bumped image versions
        id: versions
        run: |
          echo "api=$(grep '^version' apps/pizza_api/pyproject.toml | head -1 | sed 's/.*= "//;s/"//')" >> "$GITHUB_OUTPUT"
          echo "app=$(grep '^version' apps/pizza_app/pyproject.toml | head -1 | sed 's/.*= "//;s/"//')" >> "$GITHUB_OUTPUT"

      - name: Push version bumps and tags
        run: git push origin main --follow-tags

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push
        run: just push-ghcr

  scan-prod:
    if: github.ref == 'refs/heads/main'
    needs: release
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase owner
        id: owner
        run: echo "value=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Scan pizza-api
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ steps.owner.outputs.value }}/pizza-api:${{ needs.release.outputs.api_version }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Scan pizza-app
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ steps.owner.outputs.value }}/pizza-app:${{ needs.release.outputs.app_version }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL,HIGH

  migrate:
    if: github.ref == 'refs/heads/main'
    needs: [release, scan-prod]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup

      - name: Run database migrations
        env:
          PIZZA_DB_HOST: ${{ secrets.PIZZA_DB_HOST }}
          PIZZA_DB_PORT: ${{ vars.PIZZA_DB_PORT }}
          PIZZA_DB_USER_NAME: ${{ secrets.PIZZA_DB_USER_NAME }}
          PIZZA_DB_NAME: ${{ vars.PIZZA_DB_NAME }}
          PIZZA_DB_SCHEMA_NAME: ${{ vars.PIZZA_DB_SCHEMA_NAME }}
          PIZZA_DB_PASSWORD: ${{ secrets.PIZZA_DB_PASSWORD }}
          PIZZA_DB_SSL_ENABLED: ${{ vars.PIZZA_DB_SSL_ENABLED }}
          MAINTENANCE_DB_HOST: ${{ secrets.PIZZA_DB_HOST }}
          MAINTENANCE_DB_PORT: ${{ vars.PIZZA_DB_PORT }}
          MAINTENANCE_DB_USER_NAME: ${{ secrets.PIZZA_DB_USER_NAME }}
          MAINTENANCE_DB_NAME: ${{ vars.PIZZA_DB_NAME }}
          MAINTENANCE_DB_SCHEMA_NAME: ${{ vars.PIZZA_DB_SCHEMA_NAME }}
          MAINTENANCE_DB_PASSWORD: ${{ secrets.PIZZA_DB_PASSWORD }}
          MAINTENANCE_DB_SSL_ENABLED: ${{ vars.PIZZA_DB_SSL_ENABLED }}
        run: just alembic-upgrade

  back-merge:
    # After release lands on main, open a PR syncing the version bumps back into
    # development so it doesn't fall behind. Uses a throwaway sync/ branch as the
    # PR head so main is NEVER a deletable head branch (auto-delete-on-merge once
    # deleted main itself). `needs: release` means this only runs on a real
    # release, not on the bot's bump-commit re-trigger (release is skipped then).
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          # The freshly bumped main tip that `release` just pushed (not the
          # commit that triggered this run, which predates the bump).
          ref: main
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}

      - name: Open back-merge PR (main -> development)
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          git push --force origin HEAD:refs/heads/sync/main-to-dev
          if gh pr view sync/main-to-dev --json state --jq .state 2>/dev/null | grep -qx OPEN; then
            echo "Back-merge PR already open; force-push updated it."
          else
            # [skip ci] in the title lands in the merge commit, so merging this
            # PR into development does not re-run the full pipeline. Merge with a
            # merge commit or squash (not rebase) so the marker is preserved.
            gh pr create \
              --base development \
              --head sync/main-to-dev \
              --title "[skip ci] chore: back-merge release into development" \
              --body "Automated sync of version bumps, changelog, and tags from main into development. Resolve any CHANGELOG / release_scope.env conflicts on merge."
          fi
