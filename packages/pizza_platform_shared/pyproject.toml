[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "pizza_platform_shared"
version = "0.1.0"
description = "A package with shared modules for pizza platform"
authors = [{ name = "DerpVis Codes", email = "dervis.vanleersum@gmail.com" }]
readme = "README.md"
requires-python = ">=3.13"

dependencies = [
    "pandas>=2.3.3",
    "pandera>=0.29.0",
    "pydantic>=2.12.5",
    "pydantic-settings>=2.12.0",
    "sqlalchemy>=2.0.46",
    "yarl>=1.22.0",
]

[dependency-groups]
dev = [
    "pandas-stubs>=3.0.0.260204",
]

[tool.hatch.build.targets.wheel]
packages = ["src/pizza_platform_shared"]
